<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CMS Admin - StreamVite</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./admin.css">
</head>
<body>
  <div class="admin-container">
    <aside class="sidebar">
      <h2>Stream<span>CMS</span></h2>
      <nav>
        <a href="#" class="active" id="tab-movies" onclick="switchTab('movies')">Movies</a>
        <a href="#" id="tab-analytics" onclick="switchTab('analytics')">Analytics & Users</a>
        <a href="http://localhost:8080" target="_blank">View Live Site</a>
      </nav>
    </aside>
    <main class="content">
      <!-- Movies Section -->
      <section id="section-movies">
        <header>
          <h1>Movies Manager</h1>
          <button class="btn btn-primary" onclick="openModal()">+ Add Movie</button>
        </header>
        
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Poster</th>
              <th>Title</th>
              <th>Rating</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="movie-table-body">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </section>

      <!-- Analytics Section -->
      <section id="section-analytics" class="hidden" style="display: none;">
        <header>
          <h1>Analytics Dashboard</h1>
        </header>
        
        <div style="display:flex; gap:20px; margin-bottom:40px;">
          <div style="background:var(--card-bg); padding:20px; border-radius:12px; flex:1; text-align:center;">
            <h3 style="color:var(--text-muted); font-size:14px;">Total Unique Users</h3>
            <div id="stat-users" style="font-size:36px; font-weight:700; margin-top:10px;">0</div>
          </div>
          <div style="background:var(--card-bg); padding:20px; border-radius:12px; flex:1; text-align:center;">
            <h3 style="color:var(--text-muted); font-size:14px;">Total Views</h3>
            <div id="stat-views" style="font-size:36px; font-weight:700; margin-top:10px;">0</div>
          </div>
          <div style="background:var(--card-bg); padding:20px; border-radius:12px; flex:1; text-align:center;">
            <h3 style="color:var(--text-muted); font-size:14px;">Est. Ad Revenue</h3>
            <div id="stat-revenue" style="font-size:36px; font-weight:700; margin-top:10px; color:#4caf50;">$0.00</div>
          </div>
        </div>

        <h2>Active User Sessions</h2>
        <table class="data-table" style="margin-top:20px;">
          <thead>
            <tr>
              <th>Viewer ID</th>
              <th>Total Plays</th>
              <th>Last Active</th>
            </tr>
          </thead>
          <tbody id="users-table-body">
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <!-- Modal -->
  <div id="movie-modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modal-title">Add Movie</h2>
      <form id="movie-form">
        <input type="hidden" id="movie-id">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="movie-title" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="movie-desc" rows="4" required></textarea>
        </div>
        <div class="form-group">
          <label>Poster URL</label>
          <input type="url" id="movie-poster" required>
        </div>
        <div class="form-group">
          <label>Cast (comma separated)</label>
          <input type="text" id="movie-cast" required>
        </div>
        <div class="form-group">
          <label>Rating (0-10)</label>
          <input type="number" step="0.1" id="movie-rating" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Movie</button>
        </div>
      </form>
    </div>
  </div>

  <script src="./admin.js"></script>
</body>
</html>
